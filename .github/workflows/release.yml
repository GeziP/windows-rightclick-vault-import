name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows release
    runs-on: windows-latest

    defaults:
      run:
        working-directory: kbintake

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kbintake -> target

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --bins --target x86_64-pc-windows-msvc

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ..\dist | Out-Null
          New-Item -ItemType Directory -Force ..\dist\crt | Out-Null
          Copy-Item .\target\x86_64-pc-windows-msvc\release\kbintake.exe ..\dist\kbintake.exe -Force
          Copy-Item .\target\x86_64-pc-windows-msvc\release\kbintakew.exe ..\dist\kbintakew.exe -Force
          Copy-Item .\assets\kbintake.ico ..\dist\kbintake.ico -Force
          $crtDir = Get-ChildItem `
            -Path "${env:ProgramFiles(x86)}\Microsoft Visual Studio" `
            -Recurse `
            -Directory `
            -Filter "Microsoft.VC143.CRT" `
            -ErrorAction Stop |
            Where-Object { $_.FullName -like "*VC\\Redist\\MSVC\\*\\x64\\Microsoft.VC143.CRT" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $crtDir) {
            throw "Microsoft.VC143.CRT redistributable directory not found."
          }
          Copy-Item "$crtDir\\*.dll" ..\dist\crt -Force
          $hash = (Get-FileHash ..\dist\kbintake.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          $guiHash = (Get-FileHash ..\dist\kbintakew.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          @(
            "kbintake.exe  sha256=$hash"
            "kbintakew.exe  sha256=$guiHash"
          ) | Set-Content ..\dist\SHA256SUMS.txt -Encoding utf8

      - name: Install NSIS
        shell: pwsh
        working-directory: .
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        working-directory: installer
        run: |
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" .\kbintake.nsi
          $hash = (Get-FileHash ..\dist\KBIntake-Setup.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          Add-Content ..\dist\SHA256SUMS.txt "KBIntake-Setup.exe  sha256=$hash"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KBIntake-Setup.exe
            dist/kbintake.exe
            dist/kbintakew.exe
            dist/kbintake.ico
            dist/SHA256SUMS.txt
          body_path: CHANGELOG.md
